<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title></title>
<style type="text/css">
html, body { height: 100%; overflow: hidden; }
body {
  background:
    radial-gradient(circle at 50% 50%, rgba(255, 214, 90, .22), transparent 32%),
    url(images/logo-ai.png) center no-repeat #fff7e8;
  background-size: auto, min(260px, 42vw);
  background-blend-mode: normal;
}
html:not(.dark-mode) body:before {
  content: "";
  position: absolute;
  top: 0;
  bottom: 0;
  left: 0;
  right: 0;
  background: rgba(255, 247, 232, .62);
}
html.dark-mode > body {
  background:
    radial-gradient(circle at 50% 50%, rgba(255, 214, 90, .13), transparent 32%),
    url(images/logo-ai.png) center no-repeat #121927;
  background-size: auto, min(260px, 42vw);
}
</style>
<script>
  try {
    if (document.cookie.indexOf('colorMode=dark') > -1
      || (document.cookie.indexOf('colorMode=light') === -1 && window.matchMedia('(prefers-color-scheme: dark)').matches)
    ) {
      document.documentElement.className += ' dark-mode';
    }
  } catch (e) { }
</script>
</head>
<body></body>
</html>
